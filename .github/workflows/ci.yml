name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FairShare.sln

      - name: Build
        run: dotnet build FairShare.sln --configuration Release --no-restore

      # Uncomment when tests are added
      # - name: Test
      #   run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Docker build (no push)
        run: |
          echo "Looking for Dockerfile at repo root:"
          ls -la
          docker build -t fairshare-ci:latest -f Dockerfile .
